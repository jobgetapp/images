name: publish
on:
  push:
    branches:
      - 'main'
jobs:
  publish-docker-images:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v1
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build the aws lambda image
      working-directory: ./aws/lambda
      run: docker build . --tag aws-lambda:22-latest
    - name: Tag images for release
      run: |
        docker tag aws-lambda:22-latest ghcr.io/jobgetapp/aws-lambda:node22-latest
    - name: Publish images
      run: |
        docker push ghcr.io/jobgetapp/aws-lambda:node22-latest